<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; }
    .header { padding: 16px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 10px; }
    .header img { height: 24px; }
    .header h1 { font-size: 14px; font-weight: 700; color: #1a1a1a; }
    .body { padding: 16px; }
    .status { display: flex; align-items: center; gap: 8px; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
    .status.connected { background: #ecfdf5; border: 1px solid #a7f3d0; }
    .status.disconnected { background: #fef3c7; border: 1px solid #fde68a; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status.connected .status-dot { background: #10b981; }
    .status.disconnected .status-dot { background: #f59e0b; }
    .status-text { font-size: 12px; color: #374151; }
    .preview { border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; margin-bottom: 12px; max-height: 200px; overflow: auto; }
    .preview-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #9ca3af; margin-bottom: 8px; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #f1f5f9; color: #475569; margin-top: 8px; }
    .btn-secondary:hover { background: #e2e8f0; }
    .footer { padding: 12px 16px; border-top: 1px solid #e5e7eb; text-align: center; }
    .footer a { font-size: 11px; color: #2563eb; text-decoration: none; }
    #signaturePreview table { transform-origin: top left; }
  </style>
</head>
<body>
  <div class="header">
    <h1>NeatStamp</h1>
  </div>

  <div class="body">
    <div id="status" class="status disconnected">
      <div class="status-dot"></div>
      <span class="status-text">No signature loaded</span>
    </div>

    <div class="preview">
      <div class="preview-label">Your signature</div>
      <div id="signaturePreview">
        <p style="color: #9ca3af; font-size: 12px;">Log in to NeatStamp to load your signature</p>
      </div>
    </div>

    <button id="installBtn" class="btn btn-primary" disabled>Install in Gmail</button>
    <button id="refreshBtn" class="btn btn-secondary">Refresh Signature</button>
  </div>

  <div class="footer">
    <a href="https://app.neatstamp.com/dashboard" target="_blank">Open NeatStamp Dashboard →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
